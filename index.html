<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agenda & Gaji Karyawan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        .phone-frame {
            width: 100%;
            max-width: 400px;
            background: #f8fafd;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,10,30,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            border-radius: 0;
        }

        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 12px 16px 12px;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #dbe4ee;
        }

        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #153e5c;
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .app-header span {
            background: #cddeee;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1a3f5c;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            background: #e3ebf3;
            padding: 5px;
            border-radius: 50px;
            margin-bottom: 18px;
        }

        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 40px;
            color: #3a5a7a;
            transition: 0.2s;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .nav-tab.active {
            background: white;
            color: #153e5c;
            box-shadow: 0 2px 8px rgba(44, 84, 128, 0.15);
            font-weight: 600;
        }

        .page {
            display: none;
            animation: fade 0.2s ease;
        }

        .page.active-page {
            display: block;
        }

        @keyframes fade { from {opacity:0.3;} to {opacity:1;} }

        .form-container {
            background: #ffffffd9;
            backdrop-filter: blur(2px);
            padding: 18px 14px;
            border-radius: 28px;
            box-shadow: 0 4px 14px #bacfdfb0;
            border: 1px solid #ffffff;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            color: #1f405e;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap select {
            width: 100%;
            padding: 14px 16px;
            background: white;
            border: 1.8px solid #c6d9f0;
            border-radius: 30px;
            font-size: 0.95rem;
            appearance: none;
            color: #102b40;
            font-weight: 500;
        }

        .select-wrap::after {
            content: "▼";
            font-size: 0.8rem;
            color: #2f5e88;
            position: absolute;
            right: 18px;
            top: 16px;
            pointer-events: none;
        }

        .inline-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }

        .inline-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1.8px solid #c6d9f0;
            border-radius: 40px;
            font-size: 0.9rem;
            background: white;
        }

        .btn-small {
            background: #d6e5f5;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-weight: 700;
            color: #153e5c;
            font-size: 0.85rem;
            border: 1px solid #acc4df;
            white-space: nowrap;
            cursor: pointer;
            line-height: 1;
        }

        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.8px solid #c6d9f0;
            border-radius: 24px;
            font-size: 0.95rem;
            background: white;
            resize: vertical;
            min-height: 90px;
        }

        .tanggal-setel {
            width: 100%;
        }
        
        .tanggal-setel input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            border: 1.8px solid #c6d9f0;
            border-radius: 40px;
            background: white;
            font-size: 0.95rem;
            color: #102b40;
            font-family: inherit;
            display: block;
        }
        
        .tanggal-setel input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            padding: 8px;
            cursor: pointer;
            opacity: 0.6;
            width: 24px;
            height: 24px;
        }
        
        .btn-simpan {
            width: 100%;
            background: #1a4b70;
            border: none;
            border-radius: 60px;
            padding: 16px 0;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 18px;
            box-shadow: 0 4px 12px #abc0d4;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-simpan:active {
            background: #0f3a55;
            transform: scale(0.98);
        }

        /* FILTER SECTION - dua baris filter */
        .filter-section {
            background: white;
            border-radius: 24px;
            padding: 12px 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 10px #c8d9ec;
        }
        
        .filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .filter-row:last-child {
            margin-bottom: 0;
        }
        
        .filter-label {
            font-weight: 600;
            color: #1f405e;
            font-size: 0.85rem;
            min-width: 45px;
        }
        
        .filter-select {
            flex: 1;
            padding: 10px 12px;
            border: 1.5px solid #c6d9f0;
            border-radius: 30px;
            background: white;
            font-size: 0.85rem;
            color: #102b40;
            font-weight: 500;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232f5e88' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }
        
        .btn-reset-filter {
            background: #dce9f5;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-weight: 600;
            color: #1f3d59;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #acc6e3;
            width: 100%;
            margin-top: 8px;
        }

        .list-card {
            background: #f2f7ff;
            border-radius: 24px;
            padding: 8px 6px;
            max-height: 58vh;
            overflow-y: auto;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02);
        }

        .agenda-item {
            background: white;
            border-radius: 18px;
            padding: 10px 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 6px #c8d9ec;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border: 1px solid #eef5ff;
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge-nama {
            background: #d7e8ff;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #13416b;
            white-space: nowrap;
        }

        .item-tanggal {
            font-size: 0.7rem;
            color: #33628b;
            background: #ecf3fc;
            padding: 3px 8px;
            border-radius: 30px;
            display: inline-block;
        }

        .item-keterangan {
            font-size: 0.9rem;
            color: #1a2e42;
            padding: 2px 4px;
            word-break: break-word;
        }

        .empty-message {
            text-align: center;
            color: #7592b2;
            padding: 30px 0;
            font-style: italic;
            font-size: 0.9rem;
        }

        footer {
            margin-top: 12px;
            color: #718daa;
            font-size: 0.65rem;
            text-align: center;
        }

        /* Style untuk form gaji (halaman 3) */
        .input-box {
            margin-bottom: 12px;
        }

        .input-box label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            color: #1f405e;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .input-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1.8px solid #c6d9f0;
            border-radius: 30px;
            font-size: 0.95rem;
            background: white;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .input-box {
            flex: 1;
        }

        .hasil {
            margin-top: 20px;
            padding: 15px;
            border-radius: 24px;
            background: #f2f7ff;
        }

        .hasil p {
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .total {
            margin-top: 15px;
            padding: 15px;
            border-radius: 20px;
            background: #1a4b70;
            color: white;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .icon {
            margin-right: 6px;
            color: #1f405e;
        }
    </style>
</head>
<body>
<div class="phone-frame">
    <div class="screen">
        <div class="app-header">
            <h1>Pembukuan<br>Karyawan</h1>
            <span>v.and 2.0</span>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" id="tabForm">➕ Form</button>
            <button class="nav-tab" id="tabHistory">📋 Riwayat</button>
            <button class="nav-tab" id="tabGaji">💰 Gaji</button>
        </div>

        <!-- HALAMAN 1: FORM AGENDA -->
        <div id="pageForm" class="page active-page">
            <div class="form-container">
                <div class="field">
                    <label>👤 Nama (pilih / buat)</label>
                    <div class="select-wrap">
                        <select id="namaSelect">
                        </select>
                    </div>
                    <div class="inline-row">
                        <input type="text" id="newNamaInput" placeholder="Nama karyawan">
                        <button class="btn-small" id="tambahNamaBtn">Tambah</button>
                    </div>
                </div>

                <div class="field">
                    <label>📝 Keterangan</label>
                    <textarea id="keteranganInput" placeholder="Tulis agenda, tugas..."></textarea>
                </div>

                <div class="field">
                    <label>📅 Tanggal (klik untuk setel)</label>
                    <div class="tanggal-setel">
                        <input type="date" id="tanggalInput" class="date-input">
                    </div>
                </div>

                <button class="btn-simpan" id="simpanBtn">✔ Simpan agenda</button>
            </div>
            <footer>data tersimpan di hp</footer>
        </div>

        <!-- HALAMAN 2: RIWAYAT + FILTER NAMA & BULAN -->
        <div id="pageHistory" class="page">
            <div class="filter-section">
                <div class="filter-row">
                    <span class="filter-label">Nama</span>
                    <select id="filterNama" class="filter-select">
                        <option value="SEMUA">Semua karyawan</option>
                    </select>
                </div>
                <div class="filter-row">
                    <span class="filter-label">Bulan</span>
                    <select id="filterBulan" class="filter-select">
                        <option value="SEMUA">Semua bulan</option>
                        <option value="01">Januari</option>
                        <option value="02">Februari</option>
                        <option value="03">Maret</option>
                        <option value="04">April</option>
                        <option value="05">Mei</option>
                        <option value="06">Juni</option>
                        <option value="07">Juli</option>
                        <option value="08">Agustus</option>
                        <option value="09">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>
                    </select>
                </div>
                <button class="btn-reset-filter" id="resetFilterBtn">↻ Reset filter</button>
            </div>

            <div class="list-card" id="riwayatContainer">
                <div class="empty-message">👋 Belum ada agenda.<br>Tambahkan lewat form.</div>
            </div>
            <footer style="margin-top: 12px;">riwayat tanpa tombol hapus</footer>
        </div>

        <!-- HALAMAN 3: FORM HITUNG GAJI -->
        <div id="pageGaji" class="page">
            <div class="form-container">
                <h3 style="margin-bottom: 15px; color: #153e5c;"><i class="fa-solid fa-money-bill-wave"></i> Hitung Gaji</h3>

                <div class="field">
                    <label><i class="fa-solid fa-user icon"></i> Pilih Karyawan</label>
                    <div class="select-wrap">
                        <select id="gajiNamaSelect">
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="input-box">
                        <label><i class="fa-solid fa-wallet icon"></i>Gaji / Hari</label>
                        <input type="number" id="gajiPerHari" value="100000">
                    </div>
                    <div class="input-box">
                        <label><i class="fa-solid fa-gift icon"></i>Bonus</label>
                        <input type="number" id="bonusGaji" value="0">
                    </div>
                </div>

                <div class="row">
                    <div class="input-box">
                        <label><i class="fa-solid fa-calendar icon"></i>Hari Kerja</label>
                        <input type="number" id="hariKerja" value="0">
                    </div>
                    <div class="input-box">
                        <label><i class="fa-solid fa-user-clock icon"></i>Izin</label>
                        <input type="number" id="izinGaji" value="0">
                    </div>
                </div>

                <button class="btn-simpan" onclick="hitungGaji()">
                    <i class="fa-solid fa-calculator"></i> Hitung Gaji
                </button>

                <div class="hasil">
                    <h4 style="color: #1f405e;">Hasil Perhitungan</h4>
                    <p>Nama : <span id="hNama">-</span></p>
                    <p>Gaji Pokok : Rp <span id="hPokok">0</span></p>
                    <p>Bonus : Rp <span id="hBonus">0</span></p>
                    <p>Izin (Potongan) : Rp <span id="hIzin">0</span></p>
                    
                    <div class="total">
                        TOTAL DITERIMA<br>
                        Rp <span id="totalGaji">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----------------------------------------------
        // PENYIMPANAN LOKAL (HP) - TANPA DATA CONTOH
        // ----------------------------------------------
        let daftarNama = JSON.parse(localStorage.getItem('agenda_nama_list')) || [];
        let agendaList = JSON.parse(localStorage.getItem('agenda_data')) || [];

        // elemen2
        const namaSelect = document.getElementById('namaSelect');
        const newNamaInput = document.getElementById('newNamaInput');
        const tambahNamaBtn = document.getElementById('tambahNamaBtn');
        const keteranganInput = document.getElementById('keteranganInput');
        const tanggalInput = document.getElementById('tanggalInput');
        const simpanBtn = document.getElementById('simpanBtn');
        const filterNama = document.getElementById('filterNama');
        const filterBulan = document.getElementById('filterBulan');
        const resetFilterBtn = document.getElementById('resetFilterBtn');
        const riwayatContainer = document.getElementById('riwayatContainer');

        // elemen gaji
        const gajiNamaSelect = document.getElementById('gajiNamaSelect');
        const gajiPerHari = document.getElementById('gajiPerHari');
        const bonusGaji = document.getElementById('bonusGaji');
        const hariKerja = document.getElementById('hariKerja');
        const izinGaji = document.getElementById('izinGaji');

        // tab navigasi
        const tabForm = document.getElementById('tabForm');
        const tabHistory = document.getElementById('tabHistory');
        const tabGaji = document.getElementById('tabGaji');
        const pageForm = document.getElementById('pageForm');
        const pageHistory = document.getElementById('pageHistory');
        const pageGaji = document.getElementById('pageGaji');

        // set default tanggal hari ini
        function setTodayDate() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            tanggalInput.value = `${year}-${month}-${day}`;
        }
        setTodayDate();

        // ----- update semua dropdown nama (form + filter + gaji) -----
        function refreshNamaDropdowns() {
            // select form
            namaSelect.innerHTML = '';
            if (daftarNama.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '-- belum ada nama, buat dulu --';
                opt.disabled = true;
                opt.selected = true;
                namaSelect.appendChild(opt);
            } else {
                daftarNama.forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = n;
                    opt.textContent = n;
                    namaSelect.appendChild(opt);
                });
            }

            // filter dropdown nama
            filterNama.innerHTML = '<option value="SEMUA">Semua karyawan</option>';
            daftarNama.slice().sort().forEach(n => {
                const opt = document.createElement('option');
                opt.value = n;
                opt.textContent = n;
                filterNama.appendChild(opt);
            });

            // dropdown gaji
            gajiNamaSelect.innerHTML = '';
            if (daftarNama.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '-- belum ada nama --';
                opt.disabled = true;
                opt.selected = true;
                gajiNamaSelect.appendChild(opt);
            } else {
                daftarNama.forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = n;
                    opt.textContent = n;
                    gajiNamaSelect.appendChild(opt);
                });
            }
        }

        function simpanDaftarNama() {
            localStorage.setItem('agenda_nama_list', JSON.stringify(daftarNama));
        }

        function simpanAgenda() {
            localStorage.setItem('agenda_data', JSON.stringify(agendaList));
        }

        // ----- render riwayat dengan filter nama dan bulan -----
        function renderRiwayat() {
            const filterNamaValue = filterNama.value;
            const filterBulanValue = filterBulan.value;
            
            let tampil = agendaList;
            
            // Filter berdasarkan nama
            if (filterNamaValue !== 'SEMUA') {
                tampil = tampil.filter(item => item.nama === filterNamaValue);
            }
            
            // Filter berdasarkan bulan
            if (filterBulanValue !== 'SEMUA') {
                tampil = tampil.filter(item => {
                    // item.tanggal format YYYY-MM-DD
                    const bulanItem = item.tanggal.substring(5, 7);
                    return bulanItem === filterBulanValue;
                });
            }
            
            // Urutkan berdasarkan tanggal terbaru
            tampil.sort((a,b) => (a.tanggal < b.tanggal ? 1 : -1));

            if (tampil.length === 0) {
                riwayatContainer.innerHTML = `<div class="empty-message">📭 Tidak ada agenda<br>dengan filter ini.</div>`;
                return;
            }

            let html = '';
            tampil.forEach((item) => {
                // Format tanggal Indonesia (opsional)
                const tgl = item.tanggal.split('-');
                const tglFormat = `${tgl[2]}/${tgl[1]}/${tgl[0]}`;
                
                html += `
                <div class="agenda-item">
                    <div class="item-header">
                        <span class="badge-nama">${item.nama}</span>
                        <span class="item-tanggal">${tglFormat}</span>
                    </div>
                    <div class="item-keterangan">${item.keterangan}</div>
                </div>
                `;
            });
            riwayatContainer.innerHTML = html;
        }

        // ----- fungsi hitung gaji -----
        window.hitungGaji = function() {
            let nama = gajiNamaSelect.value;
            if (!nama || nama === '') {
                alert('Pilih nama karyawan terlebih dahulu.');
                return;
            }
            
            let gaji = Number(gajiPerHari.value) || 0;
            let bonus = Number(bonusGaji.value) || 0;
            let hari = Number(hariKerja.value) || 0;
            let izin = Number(izinGaji.value) || 0;

            let gajiPokok = gaji * hari;
            let potongan = gaji * izin;
            let total = gajiPokok + bonus - potongan;

            document.getElementById("hNama").innerText = nama;
            document.getElementById("hPokok").innerText = rupiah(gajiPokok);
            document.getElementById("hBonus").innerText = rupiah(bonus);
            document.getElementById("hIzin").innerText = rupiah(potongan);
            document.getElementById("totalGaji").innerText = rupiah(total);
        }

        function rupiah(x) {
            return x.toLocaleString("id-ID");
        }

        // ----- inisialisasi / sinkronisasi awal -----
        function init() {
            agendaList.forEach(item => {
                if (!daftarNama.includes(item.nama)) {
                    daftarNama.push(item.nama);
                }
            });
            simpanDaftarNama();
            refreshNamaDropdowns();
            renderRiwayat();
        }
        init();

        // ----- tambah nama baru -----
        tambahNamaBtn.addEventListener('click', function() {
            const baru = newNamaInput.value.trim();
            if (baru === '') {
                alert('Isi nama karyawan.');
                return;
            }
            if (!daftarNama.includes(baru)) {
                daftarNama.push(baru);
                simpanDaftarNama();
                refreshNamaDropdowns();
                namaSelect.value = baru;
                newNamaInput.value = '';
            } else {
                alert('Nama sudah ada.');
                newNamaInput.value = '';
            }
        });

        // ----- simpan agenda baru -----
        simpanBtn.addEventListener('click', function() {
            const nama = namaSelect.value;
            if (!nama || nama === '') {
                alert('Pilih atau buat nama terlebih dahulu.');
                return;
            }
            const keterangan = keteranganInput.value.trim();
            if (!keterangan) {
                alert('Keterangan tidak boleh kosong.');
                return;
            }
            let tanggal = tanggalInput.value;
            if (!tanggal) {
                setTodayDate();
                tanggal = tanggalInput.value;
            }

            agendaList.push({ nama, keterangan, tanggal });
            simpanAgenda();

            keteranganInput.value = '';
            setTodayDate();

            if (pageHistory.classList.contains('active-page')) {
                renderRiwayat();
            } else {
                renderRiwayat();
            }

            alert('Agenda tersimpan!');
        });

        // ----- event filter ganda -----
        filterNama.addEventListener('change', function() {
            renderRiwayat();
        });

        filterBulan.addEventListener('change', function() {
            renderRiwayat();
        });

        resetFilterBtn.addEventListener('click', function() {
            filterNama.value = 'SEMUA';
            filterBulan.value = 'SEMUA';
            renderRiwayat();
        });

        // tab navigasi
        tabForm.addEventListener('click', function() {
            tabForm.classList.add('active');
            tabHistory.classList.remove('active');
            tabGaji.classList.remove('active');
            pageForm.classList.add('active-page');
            pageHistory.classList.remove('active-page');
            pageGaji.classList.remove('active-page');
        });

        tabHistory.addEventListener('click', function() {
            tabHistory.classList.add('active');
            tabForm.classList.remove('active');
            tabGaji.classList.remove('active');
            pageHistory.classList.add('active-page');
            pageForm.classList.remove('active-page');
            pageGaji.classList.remove('active-page');
            renderRiwayat();
        });

        tabGaji.addEventListener('click', function() {
            tabGaji.classList.add('active');
            tabForm.classList.remove('active');
            tabHistory.classList.remove('active');
            pageGaji.classList.add('active-page');
            pageForm.classList.remove('active-page');
            pageHistory.classList.remove('active-page');
        });

        window.addEventListener('storage', function(e) {
            if (e.key === 'agenda_data') {
                agendaList = JSON.parse(e.newValue) || [];
                init();
            }
            if (e.key === 'agenda_nama_list') {
                daftarNama = JSON.parse(e.newValue) || [];
                refreshNamaDropdowns();
            }
        });
    })();
</script>
</body>
</html>
